# SmartHome MQTT broker config. Install to /etc/mosquitto/conf.d/smarthome.conf.
#
# Listen on all interfaces so the hub (running on another host) can connect over the LAN.
listener 1883 0.0.0.0

# Trusted home LAN: anonymous access, for the quickest start.
allow_anonymous true

# Hardening (recommended for anything beyond a trusted LAN): comment the line above, uncomment
# these two, and create the password file with `sudo mosquitto_passwd -c /etc/mosquitto/passwd smarthome`.
# allow_anonymous false
# password_file /etc/mosquitto/passwd

# Keep retained messages across restarts so the hub gets the last reading on (re)subscribe.
persistence true
persistence_location /var/lib/mosquitto/
