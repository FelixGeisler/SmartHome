#!/bin/false
# cognitive-core.conf — SmartHome
# Sourced by cognitive-core hooks/skills at runtime (shell syntax).
# Doubles as the answers for the plugin `/setup` prompts.

# ===== PROJECT IDENTITY =====
CC_PROJECT_NAME="smarthome"
CC_PROJECT_DESCRIPTION="Spring Boot smart-home hub"
CC_ORG="felixgeisler"

# ===== PLATFORM =====
CC_PLATFORM="claude"

# ===== LANGUAGE & STACK =====
# "java" is the safe baseline; pick the richer "spring-boot" pack in the installer if it's offered.
CC_LANGUAGE="java"
CC_LINT_EXTENSIONS=".java"
# Whole-project gates (Maven can't lint a single file). NOTE: post-edit-lint runs this on EVERY
# edit, so it'll be slow per edit — your committed M6 post-edit-lint is the fast alternative.
CC_LINT_COMMAND="./mvnw -q checkstyle:check pmd:check"
CC_TEST_COMMAND="./mvnw -q test"
CC_TEST_PATTERN="src/test/**/*.java"

# ===== ARCHITECTURE =====
CC_ARCHITECTURE="layered"
CC_SRC_ROOT="src/main/java"
CC_TEST_ROOT="src/test/java"

# ===== DATABASE =====
CC_DATABASE="none"   # H2 in-memory with auto-DDL; no external schema work

# ===== AGENTS =====
CC_AGENTS="coordinator reviewer architect tester"
CC_COORDINATOR_MODEL="opus"
CC_SPECIALIST_MODEL="sonnet"

# ===== SKILLS =====
CC_SKILLS="session-resume code-review pre-commit fitness test-scaffold"

# ===== HOOKS =====
# You already ship M6 security hooks; this is cognitive-core's lighter set. On a full install
# these supersede yours — on the plugin path both load (harmless).
CC_HOOKS="setup-env compact-reminder validate-bash validate-write post-edit-lint"

# ===== SAFETY =====
CC_SECURITY_LEVEL="standard"

# ===== GIT =====
CC_MAIN_BRANCH="main"
# Your repo uses "#<issue> Sentence." commits, not type(scope): — keep freeform so /pre-commit
# and the commit-fitness gate don't penalize your established style.
CC_COMMIT_FORMAT="freeform"

# ===== CI/CD — OFF (you use GitHub Actions; no monitoring/k8s/Docker) =====
CC_ENABLE_CICD="false"
CC_MONITORING="false"

# ===== FITNESS GATES (the bonus target is the merge gate, 90%) =====
CC_FITNESS_LINT="60"
CC_FITNESS_COMMIT="80"
CC_FITNESS_TEST="85"
CC_FITNESS_MERGE="90"
CC_FITNESS_DEPLOY="95"
