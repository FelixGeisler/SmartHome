name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'supplemental-ui/**'
      - 'antora-playbook.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Least-privilege token plus the scopes the Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; don't cancel an in-progress real deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build Antora site
        # base_url carries the correct project sub-path (…github.io/SmartHome),
        # so links and assets resolve under GitHub Pages without hardcoding it.
        run: npx antora --fetch --url "${{ steps.pages.outputs.base_url }}" antora-playbook.yml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
