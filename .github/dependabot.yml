# Dependabot: weekly CVE / update PRs across the project's three ecosystems, so supply-chain
# fixes surface as reviewable PRs (adding/upgrading a dependency requires human approval per
# AI-SECURITY-POLICY.md).
version: 2
updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
