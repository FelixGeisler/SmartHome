spring:
  application:
    name: SmartHome
  jpa:
    # REST API: no view rendering, so don't hold a DB session open per request.
    open-in-view: false

smarthome:
  mqtt:
    # Disabled by default so the app and its tests boot without a broker. Enable per
    # environment and point at a broker; credentials come from the environment, never here.
    enabled: false
    broker-url: tcp://localhost:1883
    topic-filter: home/+/+
    # username: ${SMARTHOME_MQTT_USERNAME}
    # password: ${SMARTHOME_MQTT_PASSWORD}
