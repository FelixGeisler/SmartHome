server.port=8080

# ── H2 File Database ──────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/smarthome;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Philips Hue ───────────────────────────────────────────────────
# Find bridge IP via https://discovery.meethue.com or your router's DHCP table
hue.bridge.ip=192.168.1.XX
# Generate an application key: POST https://{bridge-ip}/api with body {"devicetype":"smarthome-hub"}
hue.bridge.application-key=YOUR_HUE_APP_KEY
# Bridge uses a self-signed TLS cert; set false only if you import the cert into a custom truststore
hue.bridge.trust-all-certs=true

# ── Homematic CCU3 ───────────────────────────────────────────────
# Configure via Settings → Integrations in the UI

# ── MQTT (Raspberry Pi Sensors) ───────────────────────────────────
mqtt.broker-url=tcp://raspberrypi.local:1883
mqtt.client-id=smarthome-hub
mqtt.username=
mqtt.password=
# All sensor topics must start with this prefix: {prefix}/{room}/{metric}
mqtt.topic-prefix=smarthome/sensors

# ── Optional Basic Auth ───────────────────────────────────────────
# Set enabled=true and change username/password to protect the hub
smarthome.auth.enabled=false
smarthome.auth.username=admin
smarthome.auth.password=changeme

# ── JPA / open-in-view ────────────────────────────────────────────
spring.jpa.open-in-view=false

# ── MCP server ────────────────────────────────────────────────────
# Exposes tools, resources and prompts for any MCP client (Claude Desktop,
# Cursor, the in-app chat). SSE transport is mounted at /mcp/sse with the
# message-post endpoint at /mcp/message.
spring.ai.mcp.server.name=smarthome-mcp
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.sse-endpoint=/mcp/sse
spring.ai.mcp.server.sse-message-endpoint=/mcp/message
spring.ai.mcp.server.instructions=Smart-home hub. Use the tools to read the current state of devices/rooms/scenes/rules, query automation history, and control devices or activate scenes. Prefer getHomeSnapshot() for whole-home questions.

# ── In-app chat (Anthropic) ───────────────────────────────────────
# Set ANTHROPIC_API_KEY in the environment to enable the in-app chat panel.
# When empty the chat beans skip wiring and /api/chat returns 503 — the rest
# of the app still boots and runs normally.
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
# Sonnet 4.6 — gave better detail and similar total latency to Haiku for tool-driven
# Q&A (API round-trips dominate). Swap to claude-haiku-4-5-20251001 if you'd rather
# trade response richness for marginally faster first token.
spring.ai.anthropic.chat.options.model=claude-sonnet-4-6
spring.ai.anthropic.chat.options.max-tokens=4096
